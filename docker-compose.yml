services:
  app:
    build: .
    container_name: app
    ports:
      - "8080:80"
    volumes:
      - ./web:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: prueba
      MYSQL_USER: usuario
      MYSQL_PASSWORD: usuario123
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
